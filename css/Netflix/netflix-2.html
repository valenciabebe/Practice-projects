<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix Clone</title>

<!-- <link rel="stylesheet" href="../Netflix/netflix-2.css"> -->

</head>

<body>

<div class="hero">

    <!-- Background Image -->
    <img class="hero-img" src="../Netflix/images/rDJegQJaCyGaYysj2g5XWY-1200-80.jpg">

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Header -->
    <header class="navbar">

        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png">

        <button class="signin">Sign In</button>

    </header>

    <!-- Hero Content -->
    <section class="hero-content">

        <h1>Unlimited movies, TV shows, and more</h1>

        <h3>Starts at ₦2500. Cancel anytime.</h3>

        <p>Ready to watch? Enter your email to create or restart your membership.</p>

        <div class="email-box">
            <input type="email" placeholder="Email address">
            <button>Get Started ></button>
        </div>

    </section>

</div>

</body>
</html>
