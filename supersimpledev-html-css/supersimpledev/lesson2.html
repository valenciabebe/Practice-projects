<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lesson 2</title>
        <style>
            .uber-button{
                background-color: black;
                color: white;
                border: none;
                border-color:white;
                height: 40px;
                width: 120px;
                cursor: pointer;
                transition: opacity 0.15s;
            }
            .uber-button:hover{
                opacity: 0.8;
            }
            .Amazon-class{
                background-color: rgb(255, 216, 0);
                border: none;
                color: black;
                width: 120px;
                height: 30px;
                border-radius: 15px;
                cursor: pointer;
                transition: background-color 0.15s;
            }
            .Amazon-class:hover{
                background-color: rgb(245, 205, 3);
            }
            .github-class{
                background-color: rgb(46, 164, 79);
                color: white;
                border: none;
                width: 90px;
                height: 40px;
                font-weight: bold;
                font-size: 15px;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.15s, box-shadow 0.15s;
            }
            .github-class:hover{
                background-color: rgb(39, 139, 67);
                box-shadow: 0px 5px 8px rgba(0, 0, 0, 0.15);
            }
            .bootstrap-get-started-class{
                background-color: rgb(121, 82, 179);
                color: white;
                border: none;
                width: 100px;
                height: 35px;
                font-weight: bold;
                border-radius: 5px;
                cursor: pointer;
                transition:background-color 0.15s;
            }
            .bootstrap-get-started-class:hover{
                background-color: rgb(99, 62, 159);
            }
            .bootstrap-download-class{
                background-color: rgb(255, 255, 255);
                color: rgb(108, 117, 125);
                border-width: 1px;
                border-style: solid;
                border-color: rgb(108, 117, 125);
                width: 90px;
                height: 35px;
                font-weight: bold;
                border-radius: 5px;
                cursor: pointer;
                transition: background-color 0.15s;
            }
            .bootstrap-download-class:hover{
                background-color: rgb(240, 240, 240);
            }
            .linkedin-company-website-class{
                background-color: rgb(10, 102, 194);
                color: white;
                width: 200px;
                height: 30px;
                border-radius: 15px;
                cursor: pointer;
                margin-right: 8px;
                transition: background-color 0.15s;
            }
            .linkedin-company-website-class:hover{
                background-color: rgb(2, 70, 138);
            }
            .linkedin-save-class{
                background-color: rgb(255, 255, 255);
                color: rgb(10, 102, 194);
                border-width: 1px;
                border-style: solid;
                border-color: rgb(10, 102, 194);
                width: 80px;
                height: 30px;
                font-weight: bold;
                font-size: 15px;
                border-radius: 15px;
                cursor: pointer;
                transition: background-color 0.15s, border-width 0.15s;
            }
            .linkedin-save-class:hover{
                background-color: rgb(226, 240, 254);
                border-width:2px;
            }
                
        </style>
    </head>
    <body>
        <button class = 'uber-button'> Request now </button>
        <button class = "Amazon-class"> Add to Cart
        </button>
        <button class = "github-class">
            Sign up
        </button>
        <p>
            <button class="bootstrap-get-started-class">Get started</button>
            <button class="bootstrap-download-class"> Download</button>
        </p>
        <p>
            <button class = "linkedin-company-website-class">Apply on company website</button>
            <button class = "linkedin-save-class">Save</button>
        </p>
    </body>
</html>
