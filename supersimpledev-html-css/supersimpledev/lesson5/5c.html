<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-family: Verdana;
            margin-top: 0px;
            margin-bottom: 0px;
            line-height: 30px;
        }
        .course-title{
            font-size: 40px;
            font-weight: bold;
            color: rgb(0, 0, 0);

        }
        .course-subtitle{
            font-size: 18px;
            color: rgb(96, 96, 96);

        }

            padding-bottom: 10px;
            padding-top: 10px;
            width: 125px;

        }

    <p class = "course-title">HTML CSS Course</p>
    <p class = "course-subtitle">Beginner to Pro</p>

    <button>Get Started</button>
