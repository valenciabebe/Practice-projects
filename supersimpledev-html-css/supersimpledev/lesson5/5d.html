<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-family: Arial;
            margin-top: 0px;
            margin-bottom: 0px;
            text-align: center;
        }
        .link{
            color: rgb(113, 172, 235);
            font-size: 18px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: color 0.3s ease, text-decoration 0.3s ease;
        }
         .link:hover{
            color: rgb(0, 0, 0);
            text-decoration: underline;
        }
        .Headliner{
            font-size: 40px;
            font-weight: bold;
            color: rgb(0, 0, 0);
            margin-top:10px;
            margin-bottom: 20px;

        }
        .Subhead{
            font-size: 18px;
            color: rgb(0, 0, 0);
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: center;

        }

    </style>
</head>
<body>
    <p class = "Headliner">Shopping for your business?

    </p>

    <p class = "Subhead">
        see how Apple at work can help
    </p>

    <p>
        <a href="https://www.apple.com/business/" class="link" target ="_blank" rel="noopener noreferrer">Learn more &gt;</a>

    </p>

    

</body>
</html>
