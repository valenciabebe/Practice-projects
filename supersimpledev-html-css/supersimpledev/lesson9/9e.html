<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
            padding: 12px;
            width:450px;

        }

        .profile-pic{
            width:50px;
            height: 50px;
            object-fit: cover;
            border-radius: 100%;
            vertical-align: middle;
            margin-right: 5px;
            object-position: center;
        }

        .text-box {
            font-size: 18px;
            border: none;
            width: 300px;
            vertical-align: middle;
        }
        .tweet-button{
            background-color: rgb(18, 97, 216);
            color:white;
            vertical-align: middle;
            border:none;
            border-radius:5px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            font-size:14px;
            font-weight: bold;
            /* text-align:center; wrong syntax */

        }
    </style>
</head>
<body>
    <div class = "card">
        <img class = "profile-pic" src="https://static.vecteezy.com/system/resources/thumbnails/050/393/628/small/cute-curious-gray-and-white-kitten-in-a-long-shot-photo.jpg" alt="Cute cat">
        <input type="text" class = "text-box"placeholder="What's happening?">
        <button class = "tweet-button">Tweet</button>
    </div>
</body>
</html>
