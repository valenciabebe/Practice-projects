<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red-square{
            width: 100px;
            height: 100px;
            background-color:red;
            display: inline-block;
        }
        .green-circle{
            background-color: green;
            width:100px;
            height:100px;
            border-radius: 100%;
            display:inline-block;
            margin-left: -20px;
        }
        .satisfied{
            border: 1px solid gray;   
            padding: 5px;
            width:500px;
            margin-top: 50px;
            font-weight: bold;
        }

        .youtube-music{
            background-color: rgb(43, 41, 41);
            padding:10px;
            width:360px;
            margin-top:50px;
        }
        .p1{
            color:white;
            font-weight: bold;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-bottom: 10px;
        }
        .p2{
            color: rgb(122, 132, 132);
            font-family: 'Franklin Gothic Medium','Arial Narrow', Arial, sans-serif; 


        }

    </style>
</head>
<body>
    <div class = "red-square"></div>
    <div class = "green-circle"></div>
    <div class = "satisfied">
        <p> Satisfied with our service?</p>
        <button> Yes</button>
        <button> No</button>
    </div>
    <div class = "youtube-music">
        <p class = "p1"> Install YouTube Music</p>
        <p class = "p2"> Add YouTube music to your desktop for quick and easy access</p>
        
    </div>
</body>
</html>
