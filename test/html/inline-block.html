<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: inline-block;
            width: 150px;
            height: 100px;
        }

        /* To understand this better toggle among display property values: inline, block, inline-block 
        Inline-block respects width and height
        Inline does not respect width and height but margin will work but not vertically
        block respects width and height*/
    </style>
</head>
<body>
    <div class="box">One</div>
    <div class="box">Two</div>
    
</body>
</html>
