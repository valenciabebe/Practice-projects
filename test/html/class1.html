    <a href="https://www.brosigo.com" target="_blank">This is a link to Brosigo.com</a> <br>
    <a href="https://www.google.com" target="_blank">This is a link to Google.com</a> <br>
    <!--
        Link element that navigates to GitHub's homepage.
        Opens in the same window/tab (target="_self").
        Displays the text "This is a link to github" as the clickable link text.
    -->
    <!--
        Link to GitHub homepage
        
        - Opens in the same frame/window (_self is the default target)
        - _parent would open the link in the parent frame (if in a frameset)
        - _self explicitly targets the current frame/window
        - _blank would open in a new tab/window
        - _top would open in the topmost frame (escaping nested frames)
    -->
    <a href="https://www.github.com" target="_self">This is a link to github</a>
</body>
